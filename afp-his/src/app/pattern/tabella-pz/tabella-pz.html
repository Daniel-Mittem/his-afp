<p-table [value]="PazienteManager.ListaPz()">
    <ng-template #header>
        <tr>
            <th>Codice Colore</th>
            <th>Anagrafica</th>
            <th>Braccialetto</th>
            <th>Patologia</th>
            <th>Note</th>
            <th>Azioni</th>
        </tr>
    </ng-template>

    <ng-template #body let-pz>
        <tr>
            <td> {{ pz.codiceColore}} </td>
            <td> {{ pz.nome}} {{ pz.cognome }} </td>
            <td> {{ pz.braccialetto}} </td>
            <td> {{ pz.patologia}} </td>
            <td> {{ pz.note}} </td>
            <td>
                <p-button label="Modifica" (onClick)="navigateToSchedaPaziente(pz.id)" />
                <p-button label="Dimetti"  (onClick)="PazienteManager.dimettiPaziente(pz.id)" />
            </td>
        </tr>
    </ng-template>

    <ng-template #emptymessage>
        <tr>
            <td colspan="6">Nessun paziente trovato.</td>
        </tr>
    </ng-template>

</p-table>
