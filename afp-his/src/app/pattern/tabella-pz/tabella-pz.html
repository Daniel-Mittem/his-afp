<div class="flex flex-column align-items-center">
<p-button (onClick)="PazienteManager.fetchPazienti()" [rounded]="true" [outlined]="true" [text]="true"
    icon="pi pi-refresh" severity="secondary" />

<p-toggle-switch [(ngModel)]="enableReFresh"/>
</div>

<p>Abilita refresh automatico: {{ enableReFresh() }}</p>
<input type="text" pInputText [(ngModel)]="nomePaziente">

<p>Pazienti presenti in ps: {{ PazienteManager.ListaPz().length }}</p>

<div class="flex flex-wrap flex-row gap-4 padding-4">
    @for(pz of PazienteManager.ListaPz(); track pz.braccialetto){
        <his-card-pz [paziente]="pz" />
    } @empty {
        <h1>Nessun paziente trovato</h1>
    }
