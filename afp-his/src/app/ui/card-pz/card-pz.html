<div class="mb-4 p-4">
    <p-card 
        class="w-2xs border-l-8 {{ setColoreDiStato() }}"
        subheader="{{ paziente().braccialetto }} - {{ paziente().codiceColore }}" >

        <div class="w-8 h-8 border-16 {{ setColoreDiStato() }} {{ paziente().codiceColore }}"> </div>

        <ng-template #title>
            <div class="flex justify-between items-center">
                <span>{{ paziente().cognome }} {{ paziente().nome }}</span>
                <i [class]="paziente().sex === 'M' ? 'pi pi-mars' : 'pi pi-key'"></i>
            </div>
        </ng-template>

        <p>
            <b>{{ paziente().patologia }}</b>
            <br />
            Note Triage: {{ paziente().note }}
        </p>

        <ng-template #footer>
            <div class="flex justify-end"> 
                <p-button label="Modifica"
                (onClick)="navigateToSchedaPaziente()" />
            </div>
        </ng-template>
    
    </p-card>
</div>
