@let srv = healthStatus().service;
@let database = healthStatus().database;
@let uptime = healthStatus().uptime;

<ul>
    <li>Service: <p-tag [severity]="srv === 'UP' ? 'success' : 'danger'" value = "{{srv}}"/> </li>
    <li>Database: <p-tag [severity]="database === 'CONNECTED'? 'success' : 'danger'" value= "{{ database }}" /></li>
    <li>Uptime:<p-tag [severity]="uptime > 0 ? 'success' : 'danger'" value= "{{uptime}}" /></li>
</ul>
