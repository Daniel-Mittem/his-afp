<header class="flex flex-row items-center shadow-md backdrop-opacity-5 rounded-1xl">
    <!-- LOGO -->
    <div class="flex items-center justify-center p-4">
        <img class="w-40" src="logo-asuit.svg" alt="logoASUIT"/>
    </div>
    <!-- AZIENDA: Localita + Reparto -->
    <div
     class="pl-1">
        <h1 class="text-4xl font-bold text-primary">{{ reparto }}</h1>
        <p class="text-sm text-gray-800 dark:text-white-900">{{ struttura }}</p>
    </div>
    <!-- DIVIDER -->
    <p-divider layout="vertical"/>
    <!--<div class="border-1 border-amber-600 h-10 mx-1"></div>-->
    <!-- AZIONI -->
    <nav class="flex flex-row items-center gap-3 pl-4">
     <p-button label="Lista PZ" routerLink="/lista-pz" [rounded]="true" />
     <p-button label="Accettazione PZ" routerLink="/accettazione-pz" variant="outlined" [rounded]="true" />
     <p-button label="Stato Servizi" routerLink="/stato-servizi"variant="outlined" [rounded]="true" />
    </nav>

    <div class="ml-auto mr-4">
        <his-darkmode-selector />
    </div>
</header>
